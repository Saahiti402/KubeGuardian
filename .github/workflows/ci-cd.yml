name: KubeGuardian CI/CD

on:
  push:
    branches:
      - main

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Backend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/kubeguardian-backend:latest ./backend

    - name: Push Backend Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/kubeguardian-backend:latest

    - name: Build Frontend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/kubeguardian-frontend:latest ./frontend

    - name: Push Frontend Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/kubeguardian-frontend:latest